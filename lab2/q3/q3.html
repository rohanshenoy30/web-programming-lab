<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Birthday Card Designer</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .main {
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        .controls {
            width: 250px;
            background-color: #fff8dc;
            padding: 15px;
            border: 1px solid #ccc;
        }

        .controls label {
            font-size: 14px;
            font-weight: bold;
        }

        .controls select,
        .controls input,
        .controls textarea {
            width: 100%;
            margin-bottom: 10px;
        }

        .card {
            width: 300px;
            height: 400px;
            background-color: yellow;
            border: 3px solid black;
            text-align: center;
            padding: 15px;
        }

        .card h2 {
            margin-top: 10px;
        }

        .card img {
            width: 150px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="main">

    <div class="controls">
        <label>Choose a background color</label>
        <select id="bgColor">
            <option value="yellow">Yellow</option>
            <option value="pink">Pink</option>
            <option value="lightblue">Light Blue</option>
            <option value="lightgreen">Light Green</option>
        </select>

        <label>Choose a font</label>
        <select id="font">
            <option value="Verdana">Verdana</option>
            <option value="Arial">Arial</option>
            <option value="Times New Roman">Times New Roman</option>
        </select>

        <label>Specify a numeric font size</label>
        <input type="number" id="fontSize" value="20">

        <label>Choose a border style</label><br>
        <input type="radio" name="border" value="solid" checked> Solid<br>
        <input type="radio" name="border" value="double"> Double<br>
        <input type="radio" name="border" value="dashed"> Dashed<br><br>

        <label>Enter the greeting text below</label>
        <textarea id="message" rows="3">Happy Birthday, and many more</textarea>

        <button id="update">Update</button>
    </div>

    <div class="card" id="card">
        <h2 id="cardText">Happy Birthday,<br>and many more</h2>
<img src="birthday.jpg" alt="Birthday Image">


    </div>

</div>

<script>
    $("#update").click(function () {

        $("#card").css("background-color", $("#bgColor").val());

        $("#cardText").css({
            "font-family": $("#font").val(),
            "font-size": $("#fontSize").val() + "px"
        });

        let borderStyle = $("input[name='border']:checked").val();
        $("#card").css("border", "4px " + borderStyle + " black");

        $("#cardText").html($("#message").val().replace(/\n/g, "<br>"));
    });
</script>

</body>
</html>
