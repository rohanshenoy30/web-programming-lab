<form method="POST">
    {% csrf_token %}
    <label>Name:</label> <input type="text" name="name" required><br><br>
    <label>Roll:</label> <input type="text" name="roll" required><br><br>
    <label>Subjects:</label>
    <select name="subject">
        <option value="Python">Python</option>
        <option value="Java">Java</option>
        <option value="Web Tech">Web Tech</option>
    </select><br><br>
    <button type="submit">Go to Second Page</button>
</form>
