<form method="POST">
    {% csrf_token %}
    <input type="text" name="name" placeholder="Student Name" required><br>
    <input type="date" name="dob" required><br>
    <input type="text" name="address" placeholder="Address" required><br>
    <input type="text" name="contact" placeholder="Contact No" required><br>
    <input type="email" name="email" placeholder="Email ID" required><br>
    <input type="number" name="english" placeholder="English Marks" max="100" required><br>
    <input type="number" name="physics" placeholder="Physics Marks" max="100" required><br>
    <input type="number" name="chemistry" placeholder="Chemistry Marks" max="100" required><br>
    <button type="submit">Submit</button>
</form>

{% if result %}
    <textarea readonly rows="6" cols="50">{{ result }}</textarea><br>
    <label>Total Percentage: <b>{{ percentage }}</b></label>
{% endif %}
