<!DOCTYPE html>
<html>
<head>
    <title>CAPTCHA Verification</title>
    <style>
        .captcha-display { 
            font-family: monospace; font-size: 28px; background: #f0f0f0; 
            padding: 15px; border: 2px dashed #999; display: inline-block;
            user-select: none; pointer-events: none; /* Prevents simple copy-paste */
        }
        .msg { font-weight: bold; margin-top: 10px; }
        .error { color: #d9534f; }
        .success { color: #5cb85c; }
    </style>
</head>
<body>
    <h2>Reproduce the CAPTCHA</h2>
    <div class="captcha-display">{{ captcha }}</div>
    
    <form method="POST" style="margin-top: 20px;">
        {% csrf_token %}
        <input type="text" name="user_captcha" placeholder="Type letters/numbers" 
               {% if disabled %} disabled style="background:#eee;" {% endif %} required>
        
        <button type="submit" {% if disabled %} disabled {% endif %}>Verify</button>
    </form>

    <p class="msg {% if 'Success' in message %}success{% else %}error{% endif %}">
        {{ message }}
    </p>

    {% if disabled %}
        <p><small>Session locked. Restart server or clear cookies to reset.</small></p>
    {% endif %}
</body>
</html>
