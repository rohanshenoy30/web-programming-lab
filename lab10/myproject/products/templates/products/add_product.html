<!DOCTYPE html>
<html>
<head>
    <title>Add Product</title>

    <script>
        function validateForm() {
            let title = document.forms["productForm"]["title"].value;
            let price = document.forms["productForm"]["price"].value;

            if (title == "") {
                alert("Title cannot be empty");
                return false;
            }

            if (price <= 0) {
                alert("Price must be positive");
                return false;
            }
        }
    </script>

    <style>
        body { font-family: Arial; background: #f4f4f4; }
        .container { width: 40%; margin: auto; background: white; padding: 20px; }
        input, textarea { width: 100%; margin: 10px 0; padding: 10px; }
        button { padding: 10px; background: blue; color: white; border: none; }
    </style>
</head>

<body>
<div class="container">
    <h2>Add Product</h2>

    <form name="productForm" method="POST" onsubmit="return validateForm()">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save</button>
    </form>

    <a href="/">View Products</a>
</div>
</body>
</html>
