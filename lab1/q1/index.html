    <title>Poem for WPL LAB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="poem-container">
        <h1>The Golden Light</h1>
        
        <p>
            The sun begins to <b>brighten</b>,<br>
            As the heavy shadows <b>lighten</b>.<br>
            The morning dew is <b>clear</b>,<br>
            The singing birds are <b>near</b>.
        </p>

        <p>
            The river starts to <b>flow</b>,<br>
            With a soft and steady <b>glow</b>.<br>
            The world begins to <b>wake</b>,<br>
            Beside the silver <b>lake</b>.
        </p>
    </div>

</body>
