<!DOCTYPE html>
<html lang="en">
<head>
  <title>Student Bio-Data</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet"
        href="https://maxcdn.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
</head>

<body>
<div class="container mt-4">
  <h2 class="text-center text-primary">Student Bio-Data Form</h2>

  <form>
    <div class="form-group">
      <label>Name</label>
      <input type="text" class="form-control" placeholder="Enter name">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" class="form-control" placeholder="Enter email">
    </div>

    <label>Gender</label><br>
    <div class="form-check form-check-inline">
      <input class="form-check-input" type="radio" name="gender">
      <label class="form-check-label">Male</label>
    </div>
    <div class="form-check form-check-inline">
      <input class="form-check-input" type="radio" name="gender">
      <label class="form-check-label">Female</label>
    </div>

    <br><br>

    <label>Skills</label><br>
    <div class="form-check">
      <input class="form-check-input" type="checkbox"> C++
    </div>
    <div class="form-check">
      <input class="form-check-input" type="checkbox"> Java
    </div>
    <div class="form-check">
      <input class="form-check-input" type="checkbox"> Python
    </div>

    <br>

    <h5>Academic Details</h5>
    <table class="table table-bordered">
      <tr>
        <th>Course</th>
        <th>Year</th>
        <th>Percentage</th>
      </tr>
      <tr>
        <td>B.Tech</td>
        <td>2026</td>
        <td>85%</td>
      </tr>
    </table>

    <button class="btn btn-success">Submit</button>
    <button class="btn btn-danger">Reset</button>
  </form>
</div>
</body>
</html>
